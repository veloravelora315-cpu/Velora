<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>متجر ملابس - الزبائن</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f5f5f5;
            direction: rtl;
        }
        /* طبقة الخلفية القابلة للتغيير */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1445205170230-053b83016050');
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            z-index: -1;
        }
        /* رأس الصفحة للزبون */
        .header {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #c0392b;
        }
        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.8rem;
        }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #c0392b;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 0.7rem;
        }
        .auth-buttons button {
            background: #4285F4;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin: 0 4px;
        }
        /* شبكة المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            padding: 30px;
            max-width: 1300px;
            margin: auto;
        }
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            text-align: center;
            padding-bottom: 15px;
        }
        .product-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }
        .price {
            font-size: 1.4rem;
            color: #27ae60;
            margin: 8px 0;
            font-weight: bold;
        }
        select.size-select {
            padding: 6px;
            margin: 8px 0;
            border-radius: 20px;
            border: 1px solid #ccc;
        }
        button {
            background: #c0392b;
            color: white;
            border: none;
            padding: 8px 16px;
            margin: 5px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .add-to-cart {
            background: #f39c12;
            color: #333;
        }
        /* السلة الجانبية */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -380px;
            width: 380px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);
            padding: 20px;
            transition: 0.3s;
            z-index: 1000;
            overflow-y: auto;
        }
        .cart-sidebar.open {
            right: 0;
        }
        .cart-item {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .cart-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .checkout-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 20px;
            z-index: 2000;
            width: 90%;
            max-width: 380px;
        }
        .checkout-modal input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 30px;
        }
        /* لوحة التحكم (تظهر فقط بالرابط السري) */
        .admin-panel {
            display: none;
            background: #2c3e50;
            color: white;
            padding: 25px;
            margin: 20px;
            border-radius: 25px;
        }
        .admin-panel h2, .admin-panel h3 { color: white; }
        .admin-panel input, .admin-panel select, .admin-panel button {
            padding: 10px;
            margin: 6px;
            border-radius: 12px;
            border: none;
        }
        .product-admin-item {
            background: #34495e;
            margin: 10px 0;
            padding: 12px;
            border-radius: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .product-admin-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 12px; }
        .order-item {
            background: #34495e;
            margin: 12px 0;
            padding: 12px;
            border-radius: 18px;
        }
        .phone { color: #f1c40f; font-weight: bold; }
        @media (max-width: 700px) {
            .products-grid { padding: 15px; gap: 15px; }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>
<div class="bg-layer" id="bgLayer"></div>

<!-- واجهة الزبون العادية -->
<div class="header">
    <div class="logo">🛍️ متجر ملابسك</div>
    <div class="auth-buttons" id="authSection">
        <button onclick="loginWithGoogle()">دخول بجوجل</button>
        <button onclick="continueAsGuest()">متابعة كزائر</button>
    </div>
    <div class="cart-icon" onclick="toggleCart()">
        🛒 <span class="cart-count" id="cartCount">0</span>
    </div>
</div>

<div class="products-grid" id="productsContainer"></div>

<!-- السلة -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
    <h3>سلة التسوق</h3>
    <div id="cartItemsList"></div>
    <div style="font-weight: bold; margin: 15px 0;">المجموع: <span id="cartTotal">0</span> ج.م</div>
    <button onclick="showCheckout()">إنهاء الطلب</button>
    <button onclick="toggleCart()" style="background: gray;">إغلاق</button>
</div>

<!-- نافذة إدخال رقم الهاتف -->
<div id="checkoutModal" class="checkout-modal" style="display: none;">
    <h3>📞 أدخل رقم هاتفك</h3>
    <input type="tel" id="customerPhone" placeholder="مثال: 01012345678" required>
    <button onclick="submitOrder()">تأكيد الطلب</button>
    <button onclick="closeCheckout()">إلغاء</button>
</div>

<!-- لوحة التحكم السرية (تظهر فقط بالرابط الصحيح) -->
<div id="adminPanel" class="admin-panel">
    <div style="display: flex; justify-content: space-between;">
        <h2>🔧 لوحة التحكم (أنت فقط)</h2>
        <button onclick="hideAdminPanel()" style="background: #e67e22;">إغلاق</button>
    </div>
    <div style="background: #1e2a36; padding: 15px; border-radius: 20px; margin: 15px 0;">
        <h3>➕ إضافة منتج جديد</h3>
        <input type="text" id="prodName" placeholder="اسم المنتج">
        <input type="number" id="prodPrice" placeholder="السعر">
        <select id="prodSize">
            <option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option>
        </select>
        <input type="file" id="prodImageFile" accept="image/*">
        <button onclick="addProductWithImage()">إضافة المنتج</button>
    </div>
    <div>
        <h3>📦 المنتجات الموجودة</h3>
        <div id="adminProductsList"></div>
    </div>
    <div>
        <h3>📞 طلبات الزبائن (مع رقم الهاتف)</h3>
        <div id="ordersList"></div>
    </div>
    <div style="background: #1e2a36; padding: 15px; border-radius: 20px;">
        <h3>🎨 تغيير الصورة الخلفية</h3>
        <input type="file" id="bgImageFile" accept="image/*">
        <button onclick="changeBackgroundFromFile()">رفع خلفية جديدة</button>
    </div>
</div>

<script>
    // --------------------- المتغيرات العامة ---------------------
    let products = [];
    let cart = [];
    let currentUser = { id: null, name: "زائر" };
    let adminMode = false; // هل نحن في وضع الإدارة؟

    // --------------------- تحميل البيانات من localStorage ---------------------
    function loadProducts() {
        const saved = localStorage.getItem("storeProducts");
        if(saved && JSON.parse(saved).length) {
            products = JSON.parse(saved);
        } else {
            // بيانات افتراضية
            products = [
                { id: 1, name: "فستان صيفي", price: 450, image: "https://placehold.co/400x500/FFB6C1/white?text=فستان", availableSizes: ["S","M","L"] },
                { id: 2, name: "تيشرت قطني", price: 180, image: "https://placehold.co/400x500/ADD8E6/white?text=T-Shirt", availableSizes: ["M","L","XL"] }
            ];
            saveProducts();
        }
        renderProducts();
    }
    function saveProducts() {
        localStorage.setItem("storeProducts", JSON.stringify(products));
    }
    // عرض المنتجات للزبون
    function renderProducts() {
        const container = document.getElementById("productsContainer");
        if(!container) return;
        container.innerHTML = "";
        products.forEach(p => {
            const sizeSelect = `<select class="size-select" data-id="${p.id}">${p.availableSizes.map(s => `<option value="${s}">${s}</option>`).join('')}</select>`;
            const card = document.createElement("div");
            card.className = "product-card";
            card.innerHTML = `
                <img src="${p.image}" onerror="this.src='https://placehold.co/400x500/cccccc/white?text=ملابس'">
                <div class="price">${p.price} ج.م</div>
                ${sizeSelect}
                <button onclick="buyNow(${p.id})">شراء الآن</button>
                <button class="add-to-cart" onclick="addToCart(${p.id})">➕ أضف للسلة</button>
            `;
            container.appendChild(card);
        });
    }
    // إضافة للسلة مع المقاس المختار
    function addToCart(productId) {
        const product = products.find(p => p.id == productId);
        if(!product) return;
        const sizeSelect = document.querySelector(`.size-select[data-id="${productId}"]`);
        const selectedSize = sizeSelect ? sizeSelect.value : "M";
        const existing = cart.find(item => item.id == productId && item.size == selectedSize);
        if(existing) {
            existing.quantity++;
        } else {
            cart.push({ ...product, quantity: 1, size: selectedSize });
        }
        updateCartUI();
    }
    function updateCartUI() {
        const count = cart.reduce((s,i) => s + i.quantity, 0);
        document.getElementById("cartCount").innerText = count;
        const cartList = document.getElementById("cartItemsList");
        cartList.innerHTML = "";
        let total = 0;
        cart.forEach(item => {
            total += item.price * item.quantity;
            cartList.innerHTML += `
                <div class="cart-item">
                    <img src="${item.image}" width="50">
                    <div>${item.name} (مقاس ${item.size})<br>${item.price} ج.م × ${item.quantity}</div>
                    <button onclick="removeFromCart('${item.id}_${item.size}')">❌</button>
                </div>
            `;
        });
        document.getElementById("cartTotal").innerText = total;
    }
    function removeFromCart(key) {
        const [id, size] = key.split('_');
        cart = cart.filter(item => !(item.id == id && item.size == size));
        updateCartUI();
    }
    function buyNow(productId) {
        const product = products.find(p => p.id == productId);
        if(!product) return;
        const sizeSelect = document.querySelector(`.size-select[data-id="${productId}"]`);
        const selectedSize = sizeSelect ? sizeSelect.value : "M";
        cart = [{ ...product, quantity: 1, size: selectedSize }];
        updateCartUI();
        showCheckout();
    }
    function showCheckout() {
        if(cart.length === 0) { alert("السلة فارغة"); return; }
        document.getElementById("checkoutModal").style.display = "block";
        toggleCart(false);
    }
    function closeCheckout() { document.getElementById("checkoutModal").style.display = "none"; }
    function submitOrder() {
        const phone = document.getElementById("customerPhone").value.trim();
        if(!phone || phone.length < 9) { alert("أدخل رقم هاتف صحيح"); return; }
        const order = {
            customer: currentUser.name,
            phone: phone,
            items: cart.map(i => ({ name: i.name, price: i.price, quantity: i.quantity, size: i.size, image: i.image })),
            total: cart.reduce((s,i)=> s + i.price*i.quantity,0),
            date: new Date().toLocaleString("ar-EG")
        };
        let orders = JSON.parse(localStorage.getItem("storeOrders") || "[]");
        orders.push(order);
        localStorage.setItem("storeOrders", JSON.stringify(orders));
        alert(`✅ تم استلام طلبك! سنتصل على ${phone}`);
        cart = [];
        updateCartUI();
        closeCheckout();
        toggleCart(false);
    }
    function toggleCart(forceClose) {
        const sidebar = document.getElementById("cartSidebar");
        const overlay = document.getElementById("overlay");
        if(forceClose === false && sidebar.classList.contains("open")) {
            sidebar.classList.remove("open");
            overlay.style.display = "none";
        } else if(!sidebar.classList.contains("open")) {
            sidebar.classList.add("open");
            overlay.style.display = "block";
        } else {
            sidebar.classList.remove("open");
            overlay.style.display = "none";
        }
    }
    // تسجيل الدخول (محاكاة)
    function loginWithGoogle() {
        currentUser = { id: "google_"+Date.now(), name: "عميل جوجل" };
        document.getElementById("authSection").innerHTML = `<span>👋 مرحباً ${currentUser.name}</span>`;
        alert("تم تسجيل الدخول بحساب جوجل");
    }
    function continueAsGuest() {
        currentUser = { id: null, name: "زائر" };
        document.getElementById("authSection").innerHTML = `<span>👋 تتصفح كزائر</span>`;
    }

    // --------------------- وظائف الإدارة (السرية) ---------------------
    // كشف إذا كنا في وضع الإدارة عبر الهاش أو المعامل
    function checkAdminAccess() {
        // استخدام window.location.hash لجعل رابط الإدارة سرياً
        // مثال: index.html#admin123
        const hash = window.location.hash.substring(1);
        if(hash === "AdminMalak2025") {
            adminMode = true;
            document.getElementById("adminPanel").style.display = "block";
            loadAdminData();
        }
    }
    function hideAdminPanel() {
        document.getElementById("adminPanel").style.display = "none";
        window.location.hash = ""; // إزالة الهاش
        adminMode = false;
    }
    function loadAdminData() {
        loadAdminProducts();
        loadOrdersForAdmin();
    }
    function loadAdminProducts() {
        const container = document.getElementById("adminProductsList");
        container.innerHTML = "";
        products.forEach(p => {
            container.innerHTML += `
                <div class="product-admin-item">
                    <img src="${p.image}">
                    <span>${p.name} - ${p.price} ج.م - مقاسات: ${p.availableSizes.join(',')}</span>
                    <input type="number" id="newPrice-${p.id}" placeholder="سعر جديد" style="width:90px">
                    <button onclick="updatePriceAdmin(${p.id})">تعديل السعر</button>
                    <button onclick="deleteProductAdmin(${p.id})" style="background:#c0392b">حذف</button>
                </div>
            `;
        });
    }
    function updatePriceAdmin(id) {
        const newPrice = parseFloat(document.getElementById(`newPrice-${id}`).value);
        if(!isNaN(newPrice) && newPrice>0) {
            const prod = products.find(p => p.id == id);
            if(prod) prod.price = newPrice;
            saveProducts();
            renderProducts();
            loadAdminProducts();
            alert("تم تعديل السعر");
        } else alert("سعر غير صالح");
    }
    function deleteProductAdmin(id) {
        if(confirm("احذف المنتج نهائياً؟")) {
            products = products.filter(p => p.id != id);
            saveProducts();
            renderProducts();
            loadAdminProducts();
        }
    }
    // إضافة منتج بصورة مرفوعة من الجهاز (Base64)
    function addProductWithImage() {
        const name = document.getElementById("prodName").value.trim();
        const price = parseFloat(document.getElementById("prodPrice").value);
        const sizeVal = document.getElementById("prodSize").value;
        const fileInput = document.getElementById("prodImageFile");
        if(!name || isNaN(price) || price<=0) {
            alert("أدخل اسم وسعر صحيحين");
            return;
        }
        if(!fileInput.files || !fileInput.files[0]) {
            alert("يرجى اختيار صورة للمنتج");
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            const imageBase64 = e.target.result;
            const newId = Date.now();
            const newProduct = {
                id: newId,
                name: name,
                price: price,
                image: imageBase64,
                availableSizes: ["S","M","L","XL"]  // يمكن تعديله لاحقاً من الكود
            };
            products.push(newProduct);
            saveProducts();
            renderProducts();
            loadAdminProducts();
            // تفريغ الحقول
            document.getElementById("prodName").value = "";
            document.getElementById("prodPrice").value = "";
            document.getElementById("prodImageFile").value = "";
            alert("✅ تمت إضافة المنتج مع الصورة");
        };
        reader.readAsDataURL(fileInput.files[0]);
    }
    function loadOrdersForAdmin() {
        const orders = JSON.parse(localStorage.getItem("storeOrders") || "[]");
        const container = document.getElementById("ordersList");
        if(!container) return;
        if(orders.length===0) { container.innerHTML = "<div>لا توجد طلبات بعد</div>"; return; }
        container.innerHTML = "";
        orders.slice().reverse().forEach(order => {
            let itemsHtml = order.items.map(it => `${it.name} (مقاس ${it.size}) ×${it.quantity}`).join(", ");
            container.innerHTML += `
                <div class="order-item">
                    <div>👤 ${order.customer}</div>
                    <div class="phone">📞 ${order.phone}</div>
                    <div>🛍️ ${itemsHtml}</div>
                    <div>💰 ${order.total} ج.م</div>
                    <div>📅 ${order.date}</div>
                </div>
            `;
        });
    }
    function changeBackgroundFromFile() {
        const fileInput = document.getElementById("bgImageFile");
        if(!fileInput.files || !fileInput.files[0]) { alert("اختر صورة خلفية"); return; }
        const reader = new FileReader();
        reader.onload = function(e) {
            const bgUrl = e.target.result;
            localStorage.setItem("storeBackground", bgUrl);
            document.getElementById("bgLayer").style.backgroundImage = `url('${bgUrl}')`;
            alert("تم تغيير الخلفية");
        };
        reader.readAsDataURL(fileInput.files[0]);
    }
    function loadBackground() {
        const savedBg = localStorage.getItem("storeBackground");
        if(savedBg) document.getElementById("bgLayer").style.backgroundImage = `url('${savedBg}')`;
    }

    // --------------------- بدء التشغيل ---------------------
    loadProducts();
    loadBackground();
    checkAdminAccess(); // فتح لوحة الإدارة إذا كان الرابط صحيحاً
</script>
</body>
</html>
