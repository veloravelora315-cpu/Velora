<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>متجر ملابس فاخر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            direction: rtl;
        }

        /* طبقة الخلفية (يمكن تغييرها) */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1531297484001-80022131f5a1?q=80&w=2020&auto=format');
            background-size: cover;
            background-position: center;
            opacity: 0.2;
            z-index: -2;
        }

        /* رأس الصفحة */
        .header {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid #2c2c2c;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f5af19, #f12711);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.8rem;
            color: #f5af19;
        }

        .cart-count {
            position: absolute;
            top: -10px;
            right: -15px;
            background: #f5af19;
            color: #0a0a0a;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .auth-buttons button {
            background: #2c2c2c;
            border: 1px solid #f5af19;
            padding: 6px 16px;
            border-radius: 40px;
            color: #f5af19;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        .auth-buttons button:hover {
            background: #f5af19;
            color: #0a0a0a;
        }

        /* شبكة المنتجات - صورتين جنب بعض على الأقل */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 30px;
            max-width: 1300px;
            margin: auto;
        }

        /* على الأقل عمودين في الشاشات المتوسطة */
        @media (min-width: 700px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (min-width: 1000px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .product-card {
            background: #141414;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #2a2a2a;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.6);
            border-color: #f5af19;
        }

        .product-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-bottom: 1px solid #2a2a2a;
        }

        .product-info {
            padding: 18px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .price {
            font-size: 1.5rem;
            color: #f5af19;
            font-weight: 700;
            margin: 10px 0;
        }

        select.size-select {
            background: #1f1f1f;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 40px;
            width: 100%;
            margin: 10px 0;
            font-size: 0.9rem;
        }

        button {
            background: #2c2c2c;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            margin: 5px 5px 0 0;
        }

        button.buy {
            background: #f5af19;
            color: #0a0a0a;
        }

        button.cart {
            background: #333;
            border: 1px solid #f5af19;
            color: #f5af19;
        }

        /* السلة الجانبية */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -420px;
            width: 400px;
            height: 100%;
            background: #0f0f0f;
            border-left: 1px solid #f5af19;
            box-shadow: -5px 0 20px rgba(0,0,0,0.8);
            padding: 25px;
            transition: 0.3s ease;
            z-index: 1001;
            overflow-y: auto;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-item {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 12px;
        }

        .cart-item img {
            width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 12px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
        }

        /* مودال رقم الهاتف */
        .checkout-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            padding: 30px;
            border-radius: 28px;
            z-index: 2000;
            width: 90%;
            max-width: 400px;
            border: 1px solid #f5af19;
            box-shadow: 0 20px 35px black;
        }

        .checkout-modal input {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            background: #2c2c2c;
            border: 1px solid #444;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
        }

        /* لوحة التحكم السرية */
        .admin-panel {
            display: none;
            background: #0a0a0a;
            border: 1px solid #f5af19;
            border-radius: 28px;
            padding: 25px;
            margin: 30px;
            color: #e0e0e0;
        }

        .admin-panel h2, .admin-panel h3 {
            color: #f5af19;
        }

        .admin-panel input, .admin-panel select, .admin-panel button {
            background: #1e1e1e;
            border: 1px solid #3a3a3a;
            padding: 10px;
            border-radius: 40px;
            color: white;
            margin: 6px;
        }

        .product-admin-item {
            background: #141414;
            padding: 12px;
            border-radius: 20px;
            margin: 12px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        .product-admin-item img {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            object-fit: cover;
        }

        .order-item {
            background: #141414;
            padding: 15px;
            border-radius: 20px;
            margin: 15px 0;
            border-right: 3px solid #f5af19;
        }

        .phone {
            color: #f5af19;
            font-weight: bold;
        }

        button.close-panel {
            background: #c0392b;
        }

        @media (max-width: 700px) {
            .cart-sidebar { width: 100%; right: -100%; }
            .products-grid { padding: 20px; gap: 20px; }
        }
    </style>
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>

<!-- واجهة الزبون الرئيسية (لا يوجد أي زر تحكم هنا) -->
<div class="header">
    <div class="logo">MALAK <span style="color:#f5af19;">|</span> FASHION</div>
    <div class="auth-buttons" id="authSection">
        <button onclick="loginWithGoogle()">دخول بجوجل</button>
        <button onclick="continueAsGuest()">متابعة كزائر</button>
    </div>
    <div class="cart-icon" onclick="toggleCart()">
        🛒 <span class="cart-count" id="cartCount">0</span>
    </div>
</div>

<div class="products-grid" id="productsContainer"></div>

<!-- السلة والمودالات -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
    <h3 style="color:#f5af19;">🛍️ سلة التسوق</h3>
    <div id="cartItemsList"></div>
    <div style="font-weight: bold; margin: 15px 0;">المجموع: <span id="cartTotal">0</span> ج.م</div>
    <button class="buy" onclick="showCheckout()">شراء الآن</button>
    <button onclick="toggleCart()" style="background:#333;">إغلاق</button>
</div>

<div id="checkoutModal" class="checkout-modal" style="display: none;">
    <h3>📞 أدخل رقم هاتفك للتواصل</h3>
    <input type="tel" id="customerPhone" placeholder="مثال: 01098765432" required>
    <button class="buy" onclick="submitOrder()">تأكيد الطلب</button>
    <button onclick="closeCheckout()">إلغاء</button>
</div>

<!-- ================= لوحة التحكم السرية (للمسؤول فقط) ================= -->
<div id="adminPanel" class="admin-panel">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>🔧 لوحة التحكم - أنت فقط</h2>
        <button class="close-panel" onclick="hideAdminPanel()">✖️ إغلاق</button>
    </div>
    <div style="background: #111; padding: 20px; border-radius: 20px; margin: 20px 0;">
        <h3>➕ إضافة منتج جديد</h3>
        <input type="text" id="prodName" placeholder="اسم المنتج">
        <input type="number" id="prodPrice" placeholder="السعر (ج.م)">
        <select id="prodSize">
            <option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option>
        </select>
        <input type="file" id="prodImageFile" accept="image/*">
        <button onclick="addProductWithImage()">✨ إضافة المنتج</button>
    </div>
    <div>
        <h3>📦 إدارة المنتجات</h3>
        <div id="adminProductsList"></div>
    </div>
    <div>
        <h3>📞 طلبات الزبائن (مع رقم الهاتف والمقاس)</h3>
        <div id="ordersList"></div>
    </div>
    <div style="background: #111; padding: 20px; border-radius: 20px; margin-top: 20px;">
        <h3>🎨 تغيير الصورة الخلفية</h3>
        <input type="file" id="bgImageFile" accept="image/*">
        <button onclick="changeBackgroundFromFile()">رفع خلفية جديدة</button>
    </div>
</div>

<script>
    // ---------- البيانات الأساسية ----------
    let products = [];
    let cart = [];
    let currentUser = { id: null, name: "زائر" };

    // ---------- تحميل وحفظ المنتجات ----------
    function loadProducts() {
        const saved = localStorage.getItem("luxury_store_products");
        if(saved && JSON.parse(saved).length) {
            products = JSON.parse(saved);
        } else {
            // منتجات افتراضية فاخرة
            products = [
                { id: 101, name: "فستان سهرة أنيق", price: 1250, image: "https://placehold.co/600x800/1a1a1a/f5af19?text=فستان1", availableSizes: ["S","M","L"] },
                { id: 102, name: "بدلة كاجوال عصرية", price: 950, image: "https://placehold.co/600x800/1a1a1a/f5af19?text=بدلة", availableSizes: ["M","L","XL"] }
            ];
            saveProducts();
        }
        renderProducts();
    }

    function saveProducts() {
        localStorage.setItem("luxury_store_products", JSON.stringify(products));
    }

    function renderProducts() {
        const container = document.getElementById("productsContainer");
        if(!container) return;
        container.innerHTML = "";
        products.forEach(p => {
            const sizeOptions = p.availableSizes.map(s => `<option value="${s}">${s}</option>`).join('');
            const card = document.createElement("div");
            card.className = "product-card";
            card.innerHTML = `
                <img src="${p.image}" onerror="this.src='https://placehold.co/600x800/222/f5af19?text=ERROR'">
                <div class="product-info">
                    <div class="product-name">${p.name}</div>
                    <div class="price">${p.price.toLocaleString()} ج.م</div>
                    <select class="size-select" data-id="${p.id}">${sizeOptions}</select>
                    <button class="buy" onclick="buyNow(${p.id})">شراء الآن</button>
                    <button class="cart" onclick="addToCart(${p.id})">➕ أضف للسلة</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // إضافة للسلة مع المقاس
    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        if(!product) return;
        const sizeSelect = document.querySelector(`.size-select[data-id="${productId}"]`);
        const selectedSize = sizeSelect ? sizeSelect.value : "M";
        const existingIndex = cart.findIndex(item => item.id === productId && item.size === selectedSize);
        if(existingIndex !== -1) {
            cart[existingIndex].quantity++;
        } else {
            cart.push({ ...product, quantity: 1, size: selectedSize });
        }
        updateCartUI();
    }

    function updateCartUI() {
        const count = cart.reduce((s,i) => s + i.quantity, 0);
        document.getElementById("cartCount").innerText = count;
        const cartList = document.getElementById("cartItemsList");
        cartList.innerHTML = "";
        let total = 0;
        cart.forEach(item => {
            total += item.price * item.quantity;
            cartList.innerHTML += `
                <div class="cart-item">
                    <img src="${item.image}" onerror="this.src='https://placehold.co/100/333/white?text=img'">
                    <div style="flex:1">
                        <strong>${item.name}</strong> (مقاس ${item.size})<br>
                        ${item.price} ج.م × ${item.quantity}
                    </div>
                    <button onclick="removeFromCart('${item.id}_${item.size}')">🗑️</button>
                </div>
            `;
        });
        document.getElementById("cartTotal").innerText = total;
    }

    function removeFromCart(key) {
        const [id, size] = key.split('_');
        cart = cart.filter(item => !(item.id == id && item.size === size));
        updateCartUI();
    }

    function buyNow(productId) {
        const product = products.find(p => p.id === productId);
        if(!product) return;
        const sizeSelect = document.querySelector(`.size-select[data-id="${productId}"]`);
        const selectedSize = sizeSelect ? sizeSelect.value : "M";
        cart = [{ ...product, quantity: 1, size: selectedSize }];
        updateCartUI();
        showCheckout();
    }

    function showCheckout() {
        if(cart.length === 0) { alert("سلة التسوق فارغة"); return; }
        document.getElementById("checkoutModal").style.display = "block";
        toggleCart(false);
    }

    function closeCheckout() { document.getElementById("checkoutModal").style.display = "none"; }

    function submitOrder() {
        const phone = document.getElementById("customerPhone").value.trim();
        if(!phone || phone.length < 9) { alert("يرجى إدخال رقم هاتف صحيح (10 أرقام)"); return; }
        const order = {
            customer: currentUser.name,
            phone: phone,
            items: cart.map(i => ({ name: i.name, price: i.price, quantity: i.quantity, size: i.size, image: i.image })),
            total: cart.reduce((s,i)=> s + i.price*i.quantity,0),
            date: new Date().toLocaleString("ar-EG")
        };
        let orders = JSON.parse(localStorage.getItem("luxury_store_orders") || "[]");
        orders.push(order);
        localStorage.setItem("luxury_store_orders", JSON.stringify(orders));
        alert(`✅ تم استلام طلبك! سنتصل بك على ${phone} لتأكيد التفاصيل.`);
        cart = [];
        updateCartUI();
        closeCheckout();
        toggleCart(false);
    }

    function toggleCart(forceClose) {
        const sidebar = document.getElementById("cartSidebar");
        const overlay = document.getElementById("overlay");
        if(forceClose === false && sidebar.classList.contains("open")) {
            sidebar.classList.remove("open");
            overlay.style.display = "none";
        } else if(!sidebar.classList.contains("open")) {
            sidebar.classList.add("open");
            overlay.style.display = "block";
        } else {
            sidebar.classList.remove("open");
            overlay.style.display = "none";
        }
    }

    // تسجيل الدخول (محاكاة بسيطة)
    function loginWithGoogle() {
        currentUser = { id: "google_"+Date.now(), name: "عميل جوجل" };
        document.getElementById("authSection").innerHTML = `<span style="color:#f5af19;">👋 مرحباً ${currentUser.name}</span>`;
        alert("تم تسجيل الدخول بحساب جوجل (محاكاة)");
    }
    function continueAsGuest() {
        currentUser = { id: null, name: "زائر" };
        document.getElementById("authSection").innerHTML = `<span>👋 تتصفح كزائر</span>`;
    }

    // ---------- لوحة التحكم السرية (الوصول عبر الرابط #AdminLux) ----------
    function checkAdminAccess() {
        if(window.location.hash === "#AdminLux") {
            document.getElementById("adminPanel").style.display = "block";
            loadAdminData();
        }
    }

    function hideAdminPanel() {
        document.getElementById("adminPanel").style.display = "none";
        window.location.hash = "";
    }

    function loadAdminData() {
        loadAdminProducts();
        loadOrdersForAdmin();
    }

    function loadAdminProducts() {
        const container = document.getElementById("adminProductsList");
        if(!container) return;
        container.innerHTML = "";
        products.forEach(p => {
            container.innerHTML += `
                <div class="product-admin-item">
                    <img src="${p.image}" onerror="this.src='https://placehold.co/80/333/white?text=NoImg'">
                    <span><strong>${p.name}</strong> - ${p.price} ج.م - مقاسات: ${p.availableSizes.join(', ')}</span>
                    <input type="number" id="newPrice-${p.id}" placeholder="سعر جديد" style="width:100px">
                    <button onclick="updatePriceAdmin(${p.id})">تعديل</button>
                    <button onclick="deleteProductAdmin(${p.id})" style="background:#c0392b;">حذف</button>
                </div>
            `;
        });
    }

    function updatePriceAdmin(id) {
        const newPrice = parseFloat(document.getElementById(`newPrice-${id}`).value);
        if(!isNaN(newPrice) && newPrice > 0) {
            const prod = products.find(p => p.id == id);
            if(prod) prod.price = newPrice;
            saveProducts();
            renderProducts();
            loadAdminProducts();
            alert("✅ تم تحديث السعر");
        } else alert("سعر غير صالح");
    }

    function deleteProductAdmin(id) {
        if(confirm("هل أنت متأكدة من حذف هذا المنتج نهائياً؟")) {
            products = products.filter(p => p.id != id);
            saveProducts();
            renderProducts();
            loadAdminProducts();
        }
    }

    function addProductWithImage() {
        const name = d
